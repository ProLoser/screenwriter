name: Run Tests

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches: 
      - main
      - master
      - 'copilot/**'  # Run on copilot branches for testing

jobs:
  test:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
    
    - name: Install dependencies
      run: npm install
    
    - name: Run tests
      run: npm test
