name: Deploy to GitHub Pages (Disabled)

# This workflow is disabled by default. To enable it, you can change the 'on' trigger.
# For example, to run on pushes to main, uncomment the following lines and remove 'on: workflow_dispatch':
# on:
#   push:
#     branches:
#       - main

on: workflow_dispatch

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install npm dependencies
        run: npm install

      - name: Build application
        run: |
          npx gulp sass
          npx gulp react

      - name: Setup Pages
        uses: actions/configure-pages@v3

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
